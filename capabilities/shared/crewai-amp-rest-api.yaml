api: crewai-amp-rest-api
spec: openapi/crewai-amp-rest-api-openapi.yml
description: >-
  Shared Naftiko capability for the CrewAI AMP per-crew REST API. Allows agents
  to discover crew inputs, kick off executions, poll status, and supply
  human-in-the-loop feedback against any deployed CrewAI crew.
auth:
  type: bearer
  env: CREWAI_AMP_TOKEN
operations:
  - operationId: listInputs
    name: List Crew Inputs
  - operationId: kickoffCrew
    name: Kickoff Crew
  - operationId: getKickoffStatus
    name: Get Kickoff Status
  - operationId: resumeKickoff
    name: Resume Kickoff
