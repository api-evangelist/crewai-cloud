name: Crew Execution
description: >-
  End-to-end workflow for launching a CrewAI AMP crew, polling status until
  completion, and surfacing results back to the caller.
inputs:
  crewName:
    description: The crew subdomain on AMP Cloud (e.g. "research-crew").
    required: true
  crewInputs:
    description: Key-value inputs the crew expects (discover via listInputs).
    required: true
steps:
  - id: discover-inputs
    capability: crewai-amp-rest-api
    operation: listInputs
    description: Discover what input parameter names the crew expects.
  - id: kickoff
    capability: crewai-amp-rest-api
    operation: kickoffCrew
    description: Launch the execution with the supplied inputs.
    input:
      body:
        inputs: '{{ crewInputs }}'
    output:
      kickoff_id: $.kickoff_id
  - id: poll
    capability: crewai-amp-rest-api
    operation: getKickoffStatus
    description: Poll for completion (status running -> completed or error).
    repeat:
      until: '$.status != "running"'
      delaySeconds: 5
    input:
      path:
        kickoff_id: '{{ steps.kickoff.kickoff_id }}'
  - id: return
    description: Return the final crew output to the caller.
    output: '{{ steps.poll.result.output }}'
